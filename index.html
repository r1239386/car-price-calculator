<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>汽車價格計算器</title>
    <link rel="stylesheet" href="./car-price-calculator.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>汽車價格計算器</h1>
        <p class="sub">輸入車價，並可動態新增「扣除項目」與「增加項目」(可自訂名稱)。</p>
      </header>

	
		<section class="card">
	  <div class="card-head">
		<h2 class="card-title">1) 基礎車價</h2>
		<input type="file" id="uploadRegInput" accept="image/*" style="display: none;" />
		<button id="uploadRegBtn" type="button" class="btn btn-secondary" style="font-size: 13px;">
		  📷 上傳行照自動辨識
		</button>
	  </div>
	  <div class="field-row">
		<label for="basePrice">車價</label>
		<input id="basePrice" type="text" inputmode="decimal" placeholder="例如：215000" value="215000" />
	  </div>
	  <div class="helper">
		金額支援輸入含逗號（例如 215,000）。小數可保留但預設顯示為整數。
	  </div>

	  <div id="regInfoBox" class="reg-info-box" style="display: none;">
		<div class="reg-info-title">行照資訊</div>
		<div class="reg-info-grid" id="regInfoGrid"></div>
	  </div>
	</section>

      <section class="grid">
        <section class="card">
          <div class="card-head">
            <h2 class="card-title">2) 扣除項目（會減掉）</h2>
            <button id="addDeductionBtn" type="button" class="btn">新增"扣除"</button>
          </div>
          <table class="list">
            <thead>
              <tr>
                <th style="width: 44%">項目</th>
                <th style="width: 34%">金額</th>
                <th style="width: 22%">操作</th>
              </tr>
            </thead>
            <tbody id="deductionTbody"></tbody>
          </table>
          <div class="empty-hint" id="deductionEmptyHint">尚未新增扣除項目。</div>
          <div class="mini-summary">
            <span>扣除總額：</span>
            <strong id="deductionTotal">0</strong>
          </div>
        </section>

        <section class="card">
          <div class="card-head">
            <h2 class="card-title">3) 增加項目（會加上）</h2>
            <div class="card-head-btns">
            <button id="addAdditionBtn" type="button" class="btn btn-secondary">新增"增加"</button>
            <button id="openUsedCarTaxModalBtn" type="button" class="btn btn-tax-old">
              舊車稅金試算
            </button>
            <button id="openNewCarTaxModalBtn" type="button" class="btn btn-tax-new">
              新車稅金試算
            </button>
            <button id="makeAllInclusiveBtn" type="button" class="btn btn-all-inclusive">
              🌟 一鍵辦到好
            </button>
          </div>
          </div>
          <table class="list">
            <thead>
              <tr>
                <th style="width: 44%">項目</th>
                <th style="width: 34%">金額</th>
                <th style="width: 22%">操作</th>
              </tr>
            </thead>
            <tbody id="additionTbody"></tbody>
          </table>
          <div class="empty-hint" id="additionEmptyHint">尚未新增增加項目。</div>
          <div class="mini-summary">
            <span>增加總額：</span>
            <strong id="additionTotal">0</strong>
          </div>
        </section>
      </section>

      <section class="card">
        <h2 class="card-title">4) 計算結果</h2>
        <div class="result">
          <div class="result-line">
            <span>新車小計</span>
            <strong id="newCarSubtotal">0</strong>
          </div>
          <div class="result-line">
            <span>舊車小計</span>
            <strong id="oldCarSubtotal">0</strong>
          </div>
          <div class="result-line total">
            <span id="finalResultLabel">最後結果</span>
            <strong id="grandTotal">0</strong>
          </div>
        </div>

        <div class="breakdown">
          <h3 class="breakdown-title">明細</h3>
          <div class="detail" id="detail"></div>
          <div class="actions">
            <button id="exportJpgBtn" class="btn btn-secondary" type="button">
              輸出JPG
            </button>
            <button id="printDetailBtn" class="btn btn-print" type="button">
              列印明細
            </button>
          </div>
        </div>
      </section>

      <section class="card" id="usedCarCard">
        <div class="card-head">
          <h2 class="card-title" style="margin: 0;">舊車</h2>
          <label class="deduction-check-row" style="border: none; padding: 0; margin: 0;">
            <input id="usedCarEnabled" type="checkbox" />
            <span>有舊車/收車(讓新車小計是0)</span>
          </label>
        </div>

        <div id="usedCarInputs" style="display: none;">
          <div class="field-row" style="margin-top: 8px;">
            <label for="usedCarAmount">舊車金額</label>
            <input id="usedCarAmount" type="text" inputmode="decimal" placeholder="例如：85000" value="0" />
          </div>

          <div class="field-row" style="margin-top: 12px;">
            <label for="usedCarLicenseTaxDelta">牌照稅 delta</label>
            <input id="usedCarLicenseTaxDelta" type="text" inputmode="decimal" placeholder="未繳填正；溢繳填負" value="0" />
          </div>

          <div class="field-row" style="margin-top: 12px;">
            <label for="usedCarFuelTaxDelta">燃料費 delta</label>
            <input id="usedCarFuelTaxDelta" type="text" inputmode="decimal" placeholder="未繳填正；溢繳填負" value="0" />
          </div>

          <div class="helper" id="usedCarGiftHint" style="display: none; margin-top: 10px;"></div>
        </div>
      </section>

      <footer class="footer">
        提示：可自行新增/移除項目並更改名稱與金額。
      </footer>
    </main>

    <div
      id="addDeductionModal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="addDeductionModalTitle"
      hidden
    >
      <div class="modal-backdrop" data-deduction-modal-dismiss tabindex="-1"></div>
      <div class="modal-panel modal-deduction">
        <h3 id="addDeductionModalTitle" class="modal-title">新增扣除項目</h3>
        <div class="modal-body">
          <label class="deduction-check-row">
            <input id="dedOptDeposit" type="checkbox" />
            <span>訂金</span>
          </label>
          <label class="deduction-check-row">
            <input id="dedOptLoan" type="checkbox" />
            <span>貸款</span>
          </label>
          <div class="deduction-check-row deduction-check-with-date">
            <label class="deduction-check-wrap">
              <input id="dedOptDownPayment" type="checkbox" />
              <span>頭期款</span>
            </label>
            <input id="dedDownPaymentDate" type="date" class="deduction-date-input" disabled />
          </div>
          <div class="deduction-check-row deduction-check-with-date">
            <label class="deduction-check-wrap">
              <input id="dedOptRemittance" type="checkbox" />
              <span>匯款</span>
            </label>
            <input id="dedRemittanceDate" type="date" class="deduction-date-input" disabled />
          </div>
          <label class="deduction-check-row">
            <input id="dedOptBlank" type="checkbox" />
            <span>空白</span>
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" id="addDeductionConfirmBtn" class="btn">確定送出</button>
        </div>
      </div>
    </div>

   <div
      id="addAdditionModal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="addAdditionModalTitle"
      hidden
    >
      <div class="modal-backdrop" data-addition-modal-dismiss tabindex="-1"></div>
      <div class="modal-panel modal-addition">
        <h3 id="addAdditionModalTitle" class="modal-title">新增增加項目</h3>
        <div class="modal-body modal-addition-body">
          <div class="addition-category">
            <h4 class="addition-category-title">過戶類</h4>
            <div class="addition-quick-grid">
              <button type="button" class="addition-quick-btn" data-name="代刻印章" data-amount="40">代刻印章</button>
              <button type="button" class="addition-quick-btn" data-name="過戶手續費" data-amount="0">過戶手續費</button>
              <button type="button" class="addition-quick-btn" data-name="領牌費(含驗車及相關費用)" data-amount="0">領牌費(含驗車及相關費用)</button>
              <button type="button" class="addition-quick-btn" data-name="選牌費(含代檢選號手續費)" data-amount="2015">選牌費(含代檢選號手續費)</button>
            </div>
          </div>
          <div class="addition-category">
            <h4 class="addition-category-title">保險類</h4>
            <div class="addition-quick-grid">
              <button type="button" class="addition-quick-btn" data-name="強制險" data-amount="0">強制險</button>
              <button type="button" class="addition-quick-btn" data-name="第三責任險" data-amount="0">第三責任險</button>
            </div>
          </div>
          <div class="addition-category">
            <h4 class="addition-category-title">貸款類</h4>
            <div class="addition-quick-grid">
              <button type="button" class="addition-quick-btn" data-name="貸款動保手續費" data-amount="4000">貸款動保手續費</button>
            </div>
          </div>
          <div class="addition-category">
            <h4 class="addition-category-title">常用配件</h4>
            <div class="addition-quick-grid">
              <button type="button" class="addition-quick-btn" data-name="行車記錄器" data-amount="0">行車記錄器</button>
              <button type="button" class="addition-quick-btn" data-name="安卓機" data-amount="0">安卓機</button>
              <button type="button" class="addition-quick-btn" data-name="避光墊" data-amount="0">避光墊</button>
              <button type="button" class="addition-quick-btn" data-name="腳踏墊" data-amount="0">腳踏墊</button>
              <button type="button" class="addition-quick-btn" data-name="胎壓偵測器" data-amount="0">胎壓偵測器</button>
              <button type="button" class="addition-quick-btn" data-name="隔熱紙" data-amount="0">隔熱紙</button>
            </div>
          </div>
          <div class="addition-category">
            <h4 class="addition-category-title">其他</h4>
            <div class="addition-quick-grid">
              <button type="button" class="addition-quick-btn addition-quick-blank" data-name="" data-amount="0">新增空白項目</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      id="usedCarTaxModal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="usedCarTaxModalTitle"
      hidden
    >
      <div class="modal-backdrop" data-modal-dismiss tabindex="-1"></div>
      <div class="modal-panel">
        <h3 id="usedCarTaxModalTitle" class="modal-title">稅金試算</h3>
        <div class="modal-body">
          <div class="modal-field">
            <label for="uctVehicleType">車種類別</label>
            <select id="uctVehicleType">
              <option value="passenger">自用小客車</option>
              <option value="truck">自用小貨車</option>
            </select>
          </div>
          <div class="modal-field">
            <label for="uctFuelType">燃油種類</label>
            <select id="uctFuelType">
              <option value="gas">汽油</option>
              <option value="diesel">柴油</option>
            </select>
          </div>
          <div class="modal-field">
            <label for="uctRange">排氣量級距</label>
            <select id="uctRange"></select>
          </div>
          <div class="modal-field modal-field-row">
            <div>
              <label for="uctStartDate">開始日期</label>
              <input id="uctStartDate" type="date" />
            </div>
            <div>
              <label for="uctEndDate">結束日期</label>
              <input id="uctEndDate" type="date" />
            </div>
          </div>
          <div class="modal-field uct-old-only" id="uctPaymentStatusWrap" style="display: none;">
            <label for="uctPaymentStatus">舊車稅金繳納狀態</label>
            <select id="uctPaymentStatus">
              <option value="none">都沒繳</option>
              <option value="license">只繳牌照稅</option>
              <option value="fuel">只繳燃料費(忘記繳牌照稅或免稅車)</option>
              <option value="both">牌照稅、燃料費都已繳</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="usedCarTaxGiftBtn" class="btn btn-gift">
            贈送
          </button>
          <button type="button" id="usedCarTaxConfirmBtn" class="btn">確定</button>
        </div>
      </div>
    </div>

    <script src="./car-price-calculator.js"></script>
  </body>
</html>
